<overlay>
	<video src="/portrait.mp4" muted autoplay loop></video>
	<button id="openChat" class="bot-right" style="margin: 20px">Chat</button>
</overlay>

<overlay id="chat" class="bgWhite">
	<phone-grid style="padding: 20px">
		<top center-content>
			<button id="closeChat">Close</button>
		</top>
		<mid>
			<flex-v class="bgWhite" left close scrollable>
				<flex-h class="bgWhite" close>
					<p style="color: green; margin-right: 10px">Gary</p>
					<p>hei lkjsdflkjs dflkjs dfskljdflks</p>
				</flex-h>
				<flex-h class="bgWhite" close>
					<p style="color: purple; margin-right: 10px">suzy</p>
					<p>hei</p>
				</flex-h>
			</flex-v>
		</mid>
		<bot max-size>
			<flex-h max-size>
				<input max-size style="flex: 3; font-size: 40px" id="message" placeholder="type your message" />
				<button max-size style="flex: 1" id="send">Send</button>
			</flex-h>
		</bot>
	</phone-grid>
</overlay>
