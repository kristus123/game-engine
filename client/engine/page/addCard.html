<phone-layout>

	<p-top center id="top">
		<button id="x">go to PracticeCard</button>
	</p-top>

	<p-mid center scrollable id="mid">

		<button id="startRecordingFront">Start recording</button>
		<button id="stopRecordingFront" disabled>Stop recording</button>
		<button id="playFront" disabled>playFront</button>

		<hr>

		<button id="startRecordingBack">start recording</button>
		<button id="stopRecordingBack" disabled>stop recording</button>
		<button id="playBack" disabled>playBack</button>

	</p-mid>

	<p-bot center>
		<flex-h>
			<button id="save" style="width:200px;">save</button>
		</flex-h>
	</p-bot>

</phone-layout>
