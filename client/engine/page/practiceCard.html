<phone-layout>

	<p-top center id="top">
		<flex-h>
			<button id="addCards" class="green">add more cards</button>
			<button id="delete" class="blue">delete</button>
		</flex-h>
	</p-top>

	<p-mid id="mid" center scrollable>
		<div id="activePractice">
			<flex-v id="buttons">
				<button id="playFront">play front</button>
				<button id="playBack">play back</button>
			</flex-v>
		</div>
	</p-mid>

	<p-mid hide id="practiceMore" center scrollable>
		 <video-div style="width:100%; height:400px;" center src="https://i.gyazo.com/4bfc3936b45b4e4b2ac45aa93fcf938b.mp4">
			 <h1>Hello World</h1>
			 <p>This is on top of the video</p>
			 <button>Click me</button>
		 </video-div>

		<h1>Finishedddd wowo wo</h1>
		<p>What now?</p>
		<button id="practiceMoreButton">Practice more</button>
	</p-mid>

	<p-bot center id="bot">
		<flex-h id="easyHard">
			<button id="easy" style="font-size: 50px;">easy</button>
			<button id="hard" style="font-size: 50px;">hard</button>
		</flex-h>
	</p-bot>

</phone-layout>
