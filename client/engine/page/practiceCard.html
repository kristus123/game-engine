<phone-layout>

	<p-top center id="top">
		<flex-h>
			<button id="addCards" class="green">add more cards</button>
			<button id="delete" class="blue">delete</button>
		</flex-h>
	</p-top>

	<p-mid center scrollable id="mid">
		<div id="activePractice">
			<flex-v id="buttons">
				<button id="playFront">play front</button>
				<button id="playBack">play back</button>
			</flex-v>
		</div>

		<div id="practiceMore" hide center>
			<h1>finished</h1>
			<p>what now?</p>
			<button id="practiceMoreButton">Practice more</button>
		</div>
	</p-mid>

	<p-bot center id="bot">
		<flex-h id="easyHard">
			<button id="easy">easy</button>
			<button id="hard">hard</button>
		</flex-h>
	</p-bot>

</phone-layout>
