<div
	style="
		width: 270px;
		height: 210px;
		background: rgba(0, 0, 0, 0.65);
		border: 1px solid rgba(255, 255, 255, 0.15);
		border-radius: 10px;
		display: flex;
		flex-direction: column;
		font-family: Arial, sans-serif;
		color: #e6e6e6;
		box-shadow: 0 8px 22px rgba(0, 0, 0, 0.6);
		backdrop-filter: blur(6px);
		overflow: hidden;
	"
>
	<div
		style="
			flex: 1;
			padding: 8px;
			overflow-y: auto;
			font-size: 12px;
			line-height: 1.35;
		"
	>
		<div style="margin-bottom: 5px">
			<span style="color: #4fc3f7">[System]</span>
			Welcome to the game.
		</div>

		<div style="margin-bottom: 5px">
			<span style="color: #81c784">Player1:</span>
			Ready?
		</div>

		<div style="margin-bottom: 5px">
			<span style="color: #ffb74d">You:</span>
			Let’s go.
		</div>
	</div>

	<div
		style="
			display: flex;
			padding: 6px;
			border-top: 1px solid rgba(255, 255, 255, 0.1);
			background: rgba(0, 0, 0, 0.4);
		"
	>
		<input
			type="text"
			placeholder="Type message..."
			style="
				flex: 1;
				padding: 5px 6px;
				border: none;
				outline: none;
				border-radius: 6px;
				background: rgba(255, 255, 255, 0.08);
				color: #fff;
				font-size: 12px;
			"
		/>

		<button
			style="
				margin-left: 5px;
				padding: 5px 8px;
				border: none;
				border-radius: 6px;
				background: #4fc3f7;
				color: #000;
				font-weight: bold;
				font-size: 12px;
				cursor: pointer;
			"
		>
			Send
		</button>
	</div>
</div>
