<div style="position: relative; display: inline-block; font-family: monospace">
	<!-- NPC (example trigger area) -->
	<div style="width: 80px; height: 80px; background: #444; border-radius: 8px"></div>

	<!-- Chat box -->
	<div
		style="
			position: absolute;
			bottom: 100%;
			left: 50%;
			transform: translateX(-50%);
			margin-bottom: 10px;

			background: rgba(20, 20, 20, 0.95);
			color: #fff;
			padding: 10px 12px;
			border-radius: 8px;

			font-size: 14px;
			white-space: nowrap;

			border: 1px solid rgba(255, 255, 255, 0.15);
			box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
		"
	>
		the weather sure is nice today

		<!-- little triangle pointer -->
		<div
			style="
				position: absolute;
				top: 100%;
				left: 50%;
				transform: translateX(-50%);

				width: 0;
				height: 0;
				border-left: 6px solid transparent;
				border-right: 6px solid transparent;
				border-top: 6px solid rgba(20, 20, 20, 0.95);
			"
		></div>
	</div>
</div>
